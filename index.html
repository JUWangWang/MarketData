<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融市場每日監控指標</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f17;--card:#13161f;--card2:#181b26;--border:#222537;
  --accent:#4da6ff;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --text:#dde2f0;--text2:#7a83a0;--text3:#454d66;
  --mono:'JetBrains Mono',monospace;--r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;padding-bottom:80px;}
.hdr{background:rgba(13,15,23,.94);backdrop-filter:blur(12px);padding:13px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.hdr-in{max-width:740px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#2563eb,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-title{font-size:16px;font-weight:700;color:var(--accent);}
.hdr-l{display:flex;align-items:center;gap:9px;}
.hdr-r{display:flex;align-items:center;gap:7px;}
.hdr-date{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--card2);border:1px solid var(--border);padding:3px 10px;border-radius:5px;}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;font-family:inherit;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.page{max-width:740px;margin:0 auto;padding:0 12px;}
.dnav{display:flex;align-items:center;gap:8px;padding:14px 0 4px;}
.db{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:8px 15px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;font-family:inherit;transition:all .18s;}
.db:hover{border-color:var(--accent);color:var(--accent);}
.db:disabled{opacity:.28;cursor:not-allowed;}
.dw{flex:1;position:relative;}
.dw select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 32px 8px 14px;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;appearance:none;}
.dw::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:11px;}
.dnote{font-size:11px;color:var(--text3);padding:3px 0 10px;font-family:var(--mono);}
.sbar{display:flex;align-items:center;gap:8px;padding:8px 13px;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:13px;font-size:11px;font-family:var(--mono);}
.sbar-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:ag 2s infinite;flex-shrink:0;}
.sbar-dot.err{background:var(--red);box-shadow:0 0 5px var(--red);animation:ar 1s infinite;}
.sbar-dot.load{background:var(--yellow);box-shadow:0 0 5px var(--yellow);}
.sec{display:flex;align-items:center;gap:7px;padding:18px 0 10px;border-bottom:1px solid var(--border);margin-bottom:13px;}
.sec-t{font-size:15px;font-weight:700;color:var(--accent);}
/* ── stag：資料來源 + 資料日期 ── */
.stag{font-size:10px;color:var(--text3);border:1px solid var(--border);padding:2px 7px;border-radius:3px;font-family:var(--mono);margin-left:2px;}
.ddate{font-size:10px;color:#5a6480;border:1px solid #1e2235;background:#141720;padding:2px 7px;border-radius:3px;font-family:var(--mono);margin-left:3px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:17px 15px;margin-bottom:10px;}
.clbl{font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.clbl b{color:var(--text);font-size:13px;}
.bn{font-size:52px;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-1px;margin-bottom:3px;}
.bn.g{color:var(--green);}.bn.y{color:var(--yellow);}.bn.r{color:var(--red);}.bn.b{color:var(--accent);}
.bn-lbl{font-size:13px;font-weight:600;margin-bottom:7px;}
.bn-chg{font-family:var(--mono);font-size:13px;margin-bottom:9px;}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.pf{height:100%;border-radius:2px;transition:width .7s ease;}
.pf.g{background:var(--green);}.pf.y{background:var(--yellow);}.pf.r{background:var(--red);}
.wrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.wb{padding:2px 9px;border-radius:4px;font-size:11px;font-weight:500;}
.wb1{background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.27);color:#fbbf24;}
.wb2{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.23);color:#f87171;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
/* yield card */
.ycard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;}
.ycard-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
.ycard-title{font-size:12px;color:var(--text2);line-height:1.7;}
.ycard-title b{color:var(--text);font-size:13px;display:block;}
.ycard-title small{font-size:9.5px;color:var(--text3);}
.ydot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.yd-g{background:var(--green);box-shadow:0 0 5px var(--green);animation:ag 2s infinite;}
.yd-y{background:var(--yellow);box-shadow:0 0 5px var(--yellow);animation:ay 2s infinite;}
.yd-r{background:var(--red);box-shadow:0 0 6px var(--red);animation:ar 1s infinite;}
.yd-off{background:var(--text3);}
.yval{font-size:30px;font-weight:700;font-family:var(--mono);color:var(--accent);margin-bottom:4px;}
.ybp-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px;}
.ybp-big{font-size:18px;font-weight:700;font-family:var(--mono);}
.ybp-unit{font-size:11px;color:var(--text2);}
.ybp-pct{font-size:11px;font-family:var(--mono);color:var(--text3);}
.ythr{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.ythr-b{padding:1px 7px;border-radius:3px;font-size:10px;font-weight:500;}
.ythr-1{background:rgba(245,158,11,.11);border:1px solid rgba(245,158,11,.24);color:#fbbf24;}
.ythr-2{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.21);color:#f87171;}
.yalert{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500;display:block;margin-top:2px;}
.yalert.ok{background:rgba(34,197,94,.08);color:var(--green);}
.yalert.warn{background:rgba(245,158,11,.09);color:var(--yellow);}
.yalert.danger{background:rgba(239,68,68,.09);color:#f87171;}
.yalert.na{color:var(--text3);}
/* yield date tag */
.ydate{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px;}
.c-up{color:var(--red);}.c-dn{color:var(--green);}
@keyframes ag{0%,100%{box-shadow:0 0 3px var(--green)}50%{box-shadow:0 0 8px var(--green),0 0 14px rgba(34,197,94,.15)}}
@keyframes ay{0%,100%{box-shadow:0 0 3px var(--yellow)}50%{box-shadow:0 0 8px var(--yellow),0 0 14px rgba(245,158,11,.18)}}
@keyframes ar{0%,100%{box-shadow:0 0 4px var(--red)}50%{box-shadow:0 0 10px var(--red),0 0 16px rgba(239,68,68,.28)}}
.stkc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.stk-price{font-size:25px;font-weight:700;font-family:var(--mono);color:var(--text);margin:4px 0 2px;}
.sbadge{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:500;}
.sb-b{background:rgba(59,130,246,.13);border:1px solid rgba(59,130,246,.27);color:#60a5fa;}
.sb-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.23);color:#f87171;}
.ai-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 17px;}
.ai-body{font-size:13.5px;line-height:1.88;color:var(--text2);}
.ai-body h2{font-size:13.5px;font-weight:700;color:var(--text);margin:13px 0 6px;}
.ai-body h2:first-child{margin-top:0;}
.ai-body p{margin-bottom:9px;}
.ai-body ol{padding-left:17px;}
.ai-body li{margin-bottom:6px;}
.sp{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spi .8s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spi{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:26px;color:var(--text3);font-size:13px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}.bn{font-size:40px;}.yval{font-size:24px;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-l">
      <div class="hdr-icon">📊</div>
      <span class="hdr-title">金融市場監控指標</span>
    </div>
    <div class="hdr-r">
      <span class="hdr-date" id="hdrDate">—</span>
      <button class="btn" onclick="loadDate(selDate)">⟳ 更新</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="dnav">
    <button class="db" id="prevBtn">‹ 前一天</button>
    <div class="dw"><select id="dateSel"></select></div>
    <button class="db" id="nextBtn" disabled>後一天 ›</button>
  </div>
  <div class="dnote" id="dnote"></div>

  <div class="sbar">
    <div class="sbar-dot load" id="sbarDot"></div>
    <span id="sbarMsg">載入中...</span>
  </div>

  <div class="sec"><span>📡</span><span class="sec-t">預警分析</span></div>

  <div class="card">
    <div class="clbl">😱 <b>VIX 恐慌指數</b>
      <span class="stag">FRED VIXCLS · yfinance</span>
      <span class="ddate" id="vixDate"></span>
    </div>
    <div class="bn y" id="vixN"><span class="sp"></span></div>
    <div class="bn-lbl" id="vixL" style="color:var(--text2)">載入中...</div>
    <div class="bn-chg" id="vixC"></div>
    <div class="pbar"><div class="pf y" id="vixP" style="width:0%"></div></div>
    <div class="wrow" id="vixWrow"></div>
  </div>

  <div class="card">
    <div class="clbl">📈 <b>MOVE 指數</b>
      <span class="stag">yfinance ^MOVE</span>
      <span class="ddate" id="moveDate"></span>
    </div>
    <div class="bn g" id="moveN"><span class="sp"></span></div>
    <div class="bn-lbl" id="moveL" style="color:var(--text2)">載入中...</div>
    <div class="bn-chg" id="moveC"></div>
    <div class="pbar"><div class="pf g" id="moveP" style="width:0%"></div></div>
    <div class="wrow" id="moveWrow"></div>
  </div>

  <!-- 公債三欄 -->
  <div class="g3">
    <div class="ycard">
      <div class="ycard-head">
        <div class="ycard-title"><b>2年期公債</b><small>FRED DGS2</small></div>
        <div class="ydot yd-off" id="y2Dot"></div>
      </div>
      <div class="yval" id="y2Val"><span class="sp"></span></div>
      <div class="ybp-row"><span class="ybp-big" id="y2Bp">—</span><span class="ybp-unit">bps</span><span class="ybp-pct" id="y2Pct"></span></div>
      <div class="ythr" id="y2Thr"></div>
      <span class="yalert na" id="y2Alert">載入中...</span>
      <div class="ydate" id="y2Date"></div>
    </div>
    <div class="ycard">
      <div class="ycard-head">
        <div class="ycard-title"><b>10年期公債</b><small>FRED DGS10</small></div>
        <div class="ydot yd-off" id="y10Dot"></div>
      </div>
      <div class="yval" id="y10Val"><span class="sp"></span></div>
      <div class="ybp-row"><span class="ybp-big" id="y10Bp">—</span><span class="ybp-unit">bps</span><span class="ybp-pct" id="y10Pct"></span></div>
      <div class="ythr" id="y10Thr"></div>
      <span class="yalert na" id="y10Alert">載入中...</span>
      <div class="ydate" id="y10Date"></div>
    </div>
    <div class="ycard">
      <div class="ycard-head">
        <div class="ycard-title"><b>30年期公債</b><small>FRED DGS30</small></div>
        <div class="ydot yd-off" id="y30Dot"></div>
      </div>
      <div class="yval" id="y30Val"><span class="sp"></span></div>
      <div class="ybp-row"><span class="ybp-big" id="y30Bp">—</span><span class="ybp-unit">bps</span><span class="ybp-pct" id="y30Pct"></span></div>
      <div class="ythr" id="y30Thr"></div>
      <span class="yalert na" id="y30Alert">載入中...</span>
      <div class="ydate" id="y30Date"></div>
    </div>
  </div>

  <div class="g2">
    <div class="card">
      <div class="clbl">📐 <b>10Y-2Y 利差</b></div>
      <div class="bn g" id="spN" style="font-size:38px"><span class="sp"></span></div>
      <div style="font-size:12px;color:var(--text3);margin-top:5px" id="spL">計算中...</div>
      <div class="wrow" style="margin-top:8px"><span class="wb wb2" style="font-size:10px">🚨 &lt; 0 倒掛</span></div>
    </div>
    <div class="card">
      <div class="clbl">🔬 <b>費半指數 SOX</b>
        <span class="stag">yfinance ^SOX</span>
        <span class="ddate" id="soxDate"></span>
      </div>
      <div class="bn b" id="soxN" style="font-size:34px"><span class="sp"></span></div>
      <div class="bn-chg" id="soxC" style="margin-top:4px;font-size:12px"></div>
      <div class="wrow" style="margin-top:7px" id="soxWrow"></div>
    </div>
  </div>

  <div class="sec"><span>📉</span><span class="sec-t">主要個股</span><span class="stag">yfinance</span></div>
  <div id="stksWrap"><div class="empty"><span class="sp"></span> 載入中...</div></div>

  <div class="sec"><span>🤖</span><span class="sec-t">每日摘要</span></div>
  <div class="ai-card"><div class="ai-body" id="aiBody"><span class="sp"></span> 載入中...</div></div>
</div>

<script>
/* ══ DATE HELPERS ══ */
const p2      = n => String(n).padStart(2,'0');
const fmtISO  = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const fmtDisp = d => `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())}`;
const todayD  = () => { const t=new Date(); t.setHours(12,0,0,0); return t; };

let selDate = todayD();

/* ══ CONFIG：先用預設值，載入時從 config.json 覆蓋 ══ */
let CFG = {
  thresholds: {
    vix:        { warn:20, danger:30 },
    move:       { warn:110, danger:120 },
    y2_bp_rise: { warn:20, danger:30 },   // 只有上升才警示
    y10_bp_rise:{ warn:15, danger:25 },
    y30_bp_rise:{ warn:15, danger:25 },
    sox_drop:   { warn:-3, danger:-6 },
  },
  stocks: [
    { symbol:'NVDA', name:'輝達',     emoji:'🟢', grade:'IG1' },
    { symbol:'TSM',  name:'台積電',   emoji:'🔵', grade:'IG1' },
    { symbol:'SMCI', name:'超微電腦', emoji:'⚡',  grade:'HY1' },
    { symbol:'ARM',  name:'安謀控股', emoji:'💻', grade:'IG1' },
    { symbol:'TSLA', name:'特斯拉',   emoji:'🚗', grade:'IG3' },
  ],
  display: { history_days:60, auto_refresh_ms:3600000 }
};

async function loadConfig() {
  try {
    const r = await fetch('./config.json?t=' + Date.now());
    if (r.ok) CFG = await r.json();
  } catch(e) { /* 使用內建預設值 */ }
}

/* ══ DATE NAV ══ */
function initDateNav() {
  const sel = document.getElementById('dateSel'), today = todayD();
  const days = (CFG.display?.history_days) || 60;
  for (let i = 0; i < days; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const o = document.createElement('option');
    o.value = fmtISO(d);
    o.textContent = fmtDisp(d) + (i===0?' (今日)':i===1?' (昨日)':'');
    if (i===0) o.selected = true;
    sel.appendChild(o);
  }
  sel.onchange = () => { selDate = new Date(sel.value+'T12:00:00'); refreshNav(); loadDate(selDate); };
  document.getElementById('prevBtn').onclick = () => { selDate.setDate(selDate.getDate()-1); syncSel(); refreshNav(); loadDate(selDate); };
  document.getElementById('nextBtn').onclick = () => { if(selDate>=todayD())return; selDate.setDate(selDate.getDate()+1); syncSel(); refreshNav(); loadDate(selDate); };
  refreshNav();
}
function syncSel() {
  const iso = fmtISO(selDate), sel = document.getElementById('dateSel');
  for (const o of sel.options) { if (o.value===iso) { o.selected=true; return; } }
  const o = document.createElement('option'); o.value=iso; o.textContent=fmtDisp(selDate); o.selected=true; sel.insertBefore(o,sel.firstChild);
}
function refreshNav() {
  const isToday = selDate.getTime() === todayD().getTime();
  document.getElementById('hdrDate').textContent = fmtDisp(selDate);
  document.getElementById('nextBtn').disabled = selDate >= todayD();
  document.getElementById('dnote').textContent = isToday
    ? '資料由 GitHub Actions 每日自動更新（美東收盤後）'
    : `顯示 ${fmtISO(selDate)} 收盤數據`;
}

/* ══ STATUS BAR ══ */
function setStatus(msg, type='load') {
  document.getElementById('sbarMsg').textContent = msg;
  document.getElementById('sbarDot').className = 'sbar-dot ' + type;
}

/* ══ LOAD JSON ══ */
async function loadDate(d) {
  const iso = fmtISO(d);
  const isToday = d.getTime() === todayD().getTime();
  const url = isToday ? './data/latest.json' : `./data/market_${iso}.json`;
  setStatus('載入中...', 'load');
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error(`找不到 ${iso} 的資料（HTTP ${r.status}）`);
    const data = await r.json();
    renderAll(data);
    const gen = data.generated_at ? new Date(data.generated_at).toLocaleString('zh-TW') : '—';
    setStatus(`✅ 資料更新時間：${gen}`, 'ok');
  } catch(e) {
    setStatus(`❌ ${e.message}`, 'err');
    showNoData();
  }
}

/* ══ RENDER HELPERS ══ */
const pctHtml = pct => {
  if (pct==null) return '';
  const cl = pct>0?'c-up':'c-dn', s = pct>0?'▲':'▼';
  return `<span class="${cl}">${s} ${Math.abs(pct).toFixed(2)}%</span>`;
};

// 顯示資料日期的小標籤
const dateBadge = dateStr => dateStr ? `📅 ${dateStr}` : '';

/* ══ renderBig：VIX / MOVE ══ */
function renderBig({nId,lId,cId,pId,dateId,thrId,d,colorFn,labelFn,pMax,thr}) {
  const ne = document.getElementById(nId);
  if (!d) {
    ne.innerHTML='<span style="color:var(--text3);font-size:15px">無資料</span>';
    if(lId) document.getElementById(lId).textContent='—';
    if(dateId) document.getElementById(dateId).textContent='';
    return;
  }
  const v=d.value, cl=colorFn(v);
  ne.className=`bn ${cl}`; ne.textContent=v.toFixed(2);
  if(lId){ const l=document.getElementById(lId); l.textContent=labelFn(v); l.style.color=`var(--${cl==='g'?'green':cl==='y'?'yellow':'red'})`; }
  if(cId) document.getElementById(cId).innerHTML = pctHtml(d.chg_pct);
  if(pId){ const p=document.getElementById(pId); p.className=`pf ${cl}`; p.style.width=Math.min(100,(v/pMax)*100)+'%'; }
  // ① 資料日期
  if(dateId) document.getElementById(dateId).textContent = dateBadge(d.date);
  // 警示標籤從 config 動態產生
  if(thrId && thr) {
    document.getElementById(thrId).innerHTML =
      `<span class="wb wb1">⚠️ 警戒(L1) &gt; ${thr.warn}</span><span class="wb wb2">🚨 警戒(L2) &gt; ${thr.danger}</span>`;
  }
}

/* ══ renderYield：公債 ── ③ 只有上升才警示 ══ */
function renderYield(pfx, d, thrKey) {
  const thr = CFG.thresholds?.[thrKey] || { warn:15, danger:25 };
  const valEl=document.getElementById(pfx+'Val'), bpEl=document.getElementById(pfx+'Bp'),
        pctEl=document.getElementById(pfx+'Pct'), dotEl=document.getElementById(pfx+'Dot'),
        altEl=document.getElementById(pfx+'Alert'), thrEl=document.getElementById(pfx+'Thr'),
        dateEl=document.getElementById(pfx+'Date');

  // 警示門檻標籤（從 config 讀）
  if(thrEl) thrEl.innerHTML =
    `<span class="ythr-b ythr-1">⚠️警戒(L1)  上升≥${thr.warn}bp</span><span class="ythr-b ythr-2">🚨警戒(L2)  上升≥${thr.danger}bp</span>`;

  if (!d) {
    valEl.innerHTML='<span style="color:var(--text3);font-size:14px">—</span>';
    bpEl.textContent='—'; dotEl.className='ydot yd-off';
    altEl.className='yalert na'; altEl.textContent='無資料';
    if(dateEl) dateEl.textContent='';
    return;
  }

  valEl.textContent = d.value.toFixed(3)+'%';
  // ① 資料日期
  if(dateEl) dateEl.textContent = dateBadge(d.date);

  const bp = d.chg_abs != null ? d.chg_abs * 100 : null;
  if (bp != null) {
    const cl = bp>0?'c-up':'c-dn';
    bpEl.innerHTML=`<span class="${cl}">${bp>0?'+':''}${bp.toFixed(2)}</span>`;
    pctEl.textContent=`(${bp>0?'+':''}${d.chg_pct.toFixed(3)}%)`;

    // ③ 只有「上升」才按門檻警示；下跌一律綠燈
    if (bp > 0 && bp >= thr.danger) {
      dotEl.className='ydot yd-r'; altEl.className='yalert danger';
      altEl.textContent=`🚨警戒（L2） 上升 ${bp.toFixed(1)} bps（門檻 +${thr.danger}bp）`;
    } else if (bp > 0 && bp >= thr.warn) {
      dotEl.className='ydot yd-y'; altEl.className='yalert warn';
      altEl.textContent=`⚠️警戒（L1） 上升 ${bp.toFixed(1)} bps（門檻 +${thr.warn}bp）`;
    } else {
      dotEl.className='ydot yd-g'; altEl.className='yalert ok';
      altEl.textContent = bp > 0
        ? `✅ 小幅上升 +${bp.toFixed(1)} bps`
        : `✅ 下降 ${bp.toFixed(1)} bps`;
    }
  } else {
    bpEl.textContent='—'; dotEl.className='ydot yd-off';
    altEl.className='yalert na'; altEl.textContent='缺少前日數據';
  }
}

/* ══ renderSpread ══ */
function renderSpread(spread) {
  const ne=document.getElementById('spN'), sl=document.getElementById('spL');
  if (spread==null) { ne.innerHTML='<span style="color:var(--text3);font-size:14px">—</span>'; sl.textContent=''; return; }
  const cl = spread<0?'r':'g';
  ne.className=`bn ${cl}`; ne.textContent=spread.toFixed(1);
  sl.textContent = spread<0?'bps 🚨警戒（L2） 利率倒掛！':'bps（正斜率）';
  sl.style.color = spread<0?'var(--red)':'var(--text3)';
}

/* ══ renderSOX ══ */
function renderSOX(d) {
  const ne=document.getElementById('soxN');
  const thr = CFG.thresholds?.sox_drop || { warn:-3, danger:-6 };
  // 警示標籤
  const wr = document.getElementById('soxWrow');
  if(wr) wr.innerHTML=`<span class="wb wb1" style="font-size:10px">⚠️警戒（L1） 日跌&gt;${Math.abs(thr.warn)}%</span><span class="wb wb2" style="font-size:10px">🚨警戒（L2） 日跌&gt;${Math.abs(thr.danger)}%</span>`;
  if(document.getElementById('soxDate') && d?.date)
    document.getElementById('soxDate').textContent = dateBadge(d.date);
  if (!d) { ne.innerHTML='<span style="color:var(--text3);font-size:14px">—</span>'; return; }
  ne.textContent = d.value.toLocaleString('en',{maximumFractionDigits:0});
  document.getElementById('soxC').innerHTML = pctHtml(d.chg_pct);
}

/* ══ renderStocks ══ */
function renderStocks(stocks) {
  const wrap = document.getElementById('stksWrap');
  const list = CFG.stocks || [];
  if (!stocks || !list.length) { wrap.innerHTML='<div class="empty">無資料</div>'; return; }
  wrap.innerHTML = `<div class="g2">${list.map(meta => {
    const k = meta.symbol;
    const d = stocks[k];
    if (!d) return `<div class="stkc"><div><div class="clbl">${meta.emoji||'📈'} <b>${k}</b> ${meta.name||''}</div><div style="color:var(--text3)">無資料</div></div></div>`;
    const cc = (d.chg_pct||0)>0?'c-up':'c-dn';
    return `<div class="stkc">
      <div>
        <div class="clbl" style="margin-bottom:4px">${meta.emoji||'📈'} <b>${k}</b> <span style="font-weight:400;color:var(--text2)">${meta.name||''}</span>
          <span class="ddate">${dateBadge(d.date)}</span>
        </div>
        <div class="stk-price">$${d.value.toFixed(2)}</div>
        <div class="${cc}" style="font-family:var(--mono);font-size:13px;font-weight:600">${(d.chg_pct||0)>0?'▲':'▼'} ${Math.abs(d.chg_pct??0).toFixed(2)}%</div>
      </div>
      <span class="sbadge ${(meta.grade||'').startsWith('HY')?'sb-r':'sb-b'}">違約: ${meta.grade||'—'}</span>
    </div>`;
  }).join('')}</div>`;
}

/* ══ renderAI ══ */
function renderAI(data) {
  const el = document.getElementById('aiBody');
  const vix = data.vix?.value, move = data.move?.value;
  const y2 = data.y2?.value, y2bp = data.y2?.chg_abs!=null?data.y2.chg_abs*100:null;
  const y10 = data.y10?.value, y10bp = data.y10?.chg_abs!=null?data.y10.chg_abs*100:null;
  const spread = data.spread, sox = data.sox?.value;
  const vCl = vix?(vix>=30?'#f87171':vix>=20?'#fbbf24':'var(--green)'):'var(--text2)';
  const tVix = CFG.thresholds?.vix || {warn:20,danger:30};
  el.innerHTML = `<h2>📋 今日重點摘要（${fmtDisp(selDate)}）</h2><ol>
    <li>VIX <b style="font-family:var(--mono);color:${vCl}">${vix?vix.toFixed(2):'—'}</b> — ${vix?vix>=tVix.danger?'高度恐慌 🚨':vix>=tVix.warn?'警戒區間 ⚠️':'市場平靜 ✅':'—'}</li>
    <li>2Y公債 ${y2?y2.toFixed(3)+'%':'—'} / 日變化 <b style="font-family:var(--mono)">${y2bp!=null?(y2bp>0?'+':'')+y2bp.toFixed(2)+' bps':'—'}</b>　10Y ${y10?y10.toFixed(3)+'%':'—'} / <b style="font-family:var(--mono)">${y10bp!=null?(y10bp>0?'+':'')+y10bp.toFixed(2)+' bps':'—'}</b></li>
    <li>10Y-2Y 利差 <b style="font-family:var(--mono);color:${spread!=null&&spread<0?'#f87171':'var(--green)'}">${spread!=null?spread.toFixed(1)+' bps':'—'}</b>${spread!=null&&spread<0?' <span style="color:#f87171">⚠️ 倒掛！</span>':''}</li>
    <li>SOX 費半 ${sox?sox.toLocaleString('en',{maximumFractionDigits:0}):'—'}　MOVE ${move?move.toFixed(2):'—'}${move?move>=(CFG.thresholds?.move?.danger||120)?' 🚨':move>=(CFG.thresholds?.move?.warn||110)?' ⚠️':' ✅':''}</li>
    <li>公債警示燈：<b>上升</b>達門檻才亮黃/紅，下跌一律綠燈。</li>
  </ol>
  <h2>📊 資料來源</h2>
  <p>由 <b>GitHub Actions</b> 每日美東收盤後自動執行 Python 腳本，來源：<b>FRED</b>（VIX · 2Y/10Y/30Y 公債）· <b>yfinance</b>（MOVE · SOX · 個股），存成靜態 JSON，頁面直接讀取。警示門檻與個股清單由 <b>config.json</b> 維護。</p>
  <p style="color:var(--text3);font-size:11.5px;margin-top:8px">資料僅供參考，不構成投資建議。</p>`;
}

/* ══ renderAll ══ */
function renderAll(data) {
  const tv = CFG.thresholds?.vix  || {warn:20,danger:30};
  const tm = CFG.thresholds?.move || {warn:110,danger:120};
  renderBig({nId:'vixN',lId:'vixL',cId:'vixC',pId:'vixP',dateId:'vixDate',thrId:'vixWrow',
    d:data.vix, pMax:80, thr:tv,
    colorFn:v=>v>=tv.danger?'r':v>=tv.warn?'y':'g',
    labelFn:v=>v>=40?'極度恐慌':v>=tv.danger?'高度恐慌':v>=tv.warn?'警戒區間':v>=12?'市場平靜':'低波動'});
  renderBig({nId:'moveN',lId:'moveL',cId:'moveC',pId:'moveP',dateId:'moveDate',thrId:'moveWrow',
    d:data.move, pMax:160, thr:tm,
    colorFn:v=>v>=tm.danger?'r':v>=tm.warn?'y':'g',
    labelFn:v=>v>=tm.danger?'高度警戒':v>=tm.warn?'偏高':'正常範圍'});
  renderYield('y2',  data.y2,  'y2_bp_rise');
  renderYield('y10', data.y10, 'y10_bp_rise');
  renderYield('y30', data.y30, 'y30_bp_rise');
  renderSpread(data.spread);
  renderSOX(data.sox);
  renderStocks(data.stocks);
  renderAI(data);
}

function showNoData() {
  ['vixN','moveN','soxN'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML='<span style="color:var(--text3);font-size:15px">無資料</span>';});
  ['vixL','moveL'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='—';});
  ['y2Val','y10Val','y30Val','spN'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML='<span style="color:var(--text3)">—</span>';});
  document.getElementById('stksWrap').innerHTML='<div class="empty">無資料</div>';
  document.getElementById('aiBody').innerHTML='<span style="color:var(--text3)">無資料</span>';
}

/* ══ INIT ══ */
(async () => {
  await loadConfig();       // 先載 config，再初始化 UI
  initDateNav();
  loadDate(selDate);
  setInterval(() => {
    if (selDate.getTime() === todayD().getTime()) loadDate(selDate);
  }, CFG.display?.auto_refresh_ms || 3600000);
})();
</script>
